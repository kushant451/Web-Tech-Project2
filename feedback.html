<!DOCTYPE html>
<html>
<head>
<title>Feedback</title>
<style>
body { margin:0; font-family:Poppins; background:#f7f9fc; }
header, footer { background:#2a2a72; color:white; text-align:center; padding:15px; }
nav li { display:inline; margin:0 15px; }
nav a { color:white; text-decoration:none; }

form {
  max-width:500px;
  margin:30px auto;
  background:white;
  padding:20px;
  border-radius:10px;
}

input, select, textarea { width:100%; padding:8px; margin-top:5px; }

button { background:#2a2a72; color:white; padding:10px; width:100%; }
</style>
</head>

<body>

<header>
<h1>Feedback</h1>
<nav>
<ul>
<li><a href="/">Home</a></li>
<li><a href="/feedback">Feedback</a></li>
<li><a href="/view">View Feedback</a></li>
<li><a href="/about">About</a></li>
<li><a href="/contact">Contact</a></li>
</ul>
</nav>
</header>

<form action="/submit_feedback" method="POST">
<input type="text" name="fullname" placeholder="Name" required>
<input type="text" name="course" placeholder="Course" required>
<input type="text" name="teacher" placeholder="Teacher" required>

<select name="rating">
<option>Excellent</option>
<option>Good</option>
<option>Average</option>
<option>Poor</option>
</select>

<textarea name="comments" placeholder="Comments"></textarea>

<button type="submit">Submit</button>
</form>

<footer>© 2026 Student Feedback System</footer>

</body>
</html>
