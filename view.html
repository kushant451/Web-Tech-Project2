<!DOCTYPE html>
<html>
<head>
<title>View Feedback</title>
<style>
body { margin:0; font-family:Poppins; background:#f7f9fc; }
header, footer { background:#2a2a72; color:white; text-align:center; padding:15px; }
nav li { display:inline; margin:0 15px; }
nav a { color:white; text-decoration:none; }

table {
  width:90%;
  margin:30px auto;
  border-collapse:collapse;
  background:white;
}

th, td {
  padding:10px;
  border:1px solid #ccc;
  text-align:center;
}

th { background:#2a2a72; color:white; }
</style>
</head>

<body>

<header>
<h1>All Feedback</h1>
<nav>
<ul>
<li><a href="/">Home</a></li>
<li><a href="/feedback">Feedback</a></li>
<li><a href="/view">View Feedback</a></li>
<li><a href="/about">About</a></li>
<li><a href="/contact">Contact</a></li>
</ul>
</nav>
</header>

<table>
<tr>
<th>ID</th>
<th>Name</th>
<th>Course</th>
<th>Teacher</th>
<th>Rating</th>
<th>Comments</th>
</tr>

{% for row in data %}
<tr>
<td>{{ row[0] }}</td>
<td>{{ row[1] }}</td>
<td>{{ row[2] }}</td>
<td>{{ row[3] }}</td>
<td>{{ row[4] }}</td>
<td>{{ row[5] }}</td>
</tr>
{% endfor %}

</table>

<footer>© 2026 Student Feedback System</footer>

</body>
</html>
