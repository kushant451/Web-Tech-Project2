<!DOCTYPE html>
<html>
<head>
<title>Contact</title>

<style>
body {
  margin:0;
  font-family:Poppins;
  background:#f7f9fc;
}

/* Header & Footer */
header, footer {
  background:#2a2a72;
  color:white;
  text-align:center;
  padding:15px;
}

nav ul {
  list-style:none;
  padding:0;
}

nav li {
  display:inline;
  margin:0 15px;
}

nav a {
  color:white;
  text-decoration:none;
}

/* Contact Box */
.contact-box {
  max-width:500px;
  margin:50px auto;
  background:white;
  padding:30px;
  border-radius:12px;
  text-align:center;
  box-shadow:0 4px 10px rgba(0,0,0,0.1);
}

.contact-box h2 {
  color:#2a2a72;
}

.contact-box p {
  color:#555;
  font-size:16px;
}

/* Button */
.btn {
  display:inline-block;
  margin-top:20px;
  background:#2a2a72;
  color:white;
  padding:10px 20px;
  text-decoration:none;
  border-radius:6px;
}
</style>
</head>

<body>

<header>
<h1>Contact</h1>
<nav>
<ul>
<li><a href="/">Home</a></li>
<li><a href="/feedback">Feedback</a></li>
<li><a href="/view">View Feedback</a></li>
<li><a href="/about">About</a></li>
<li><a href="/contact">Contact</a></li>
</ul>
</nav>
</header>

<div class="contact-box">
<h2>Get in Touch</h2>
<p>If you have any questions or suggestions, feel free to contact us.</p>
<p><strong>Email:</strong> support@studentfeedback.com</p>

<a href="/" class="btn">Back to Home</a>
</div>

<footer>© 2026 Student Feedback System</footer>

</body>
</html>
